<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAKAD Veloura University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={theme:{extend:{fontFamily:{display:['"Playfair Display"','serif'],body:['"Poppins"','sans-serif']}}}}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root{--pk:#ff9a9e;--pe:#fad0c4;--pa:#ff6b8a;--pl:#fff0f3;--p1:#ffe4ec;--bl:#e8f4fd;--bs:#a8d8ea;--cs:0 4px 24px rgba(255,107,138,.10);--ch:0 8px 32px rgba(255,107,138,.18)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:#fef7f8;color:#2d2d2d;overflow-x:hidden}
        h1,h2,h3,h4,h5{font-family:'Playfair Display',serif}
        .page{display:none;animation:fadeIn .4s ease}.page.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
        @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
        .anim-up{animation:slideUp .5s ease both}.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}.d4{animation-delay:.32s}.d5{animation-delay:.4s}.d6{animation-delay:.48s}.d7{animation-delay:.56s}
        .login-bg{min-height:100vh;background:linear-gradient(135deg,#ff9a9e 0%,#fad0c4 50%,#ffecd2 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
        .login-bg .orb{position:absolute;border-radius:50%;background:rgba(255,255,255,.13)}
        .orb-1{width:420px;height:420px;top:-120px;right:-80px;animation:float 7s ease-in-out infinite}
        .orb-2{width:320px;height:320px;bottom:-80px;left:-60px;animation:float 9s ease-in-out infinite 1s}
        .orb-3{width:160px;height:160px;top:40%;left:10%;animation:float 6s ease-in-out infinite 2s}
        .orb-4{width:100px;height:100px;top:20%;right:15%;animation:float 5s ease-in-out infinite .5s}
        .orb-5{width:200px;height:200px;bottom:10%;right:30%;animation:float 8s ease-in-out infinite 1.5s}
        .sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:linear-gradient(180deg,#ff9a9e 0%,#fad0c4 60%,#ffecd2 100%);z-index:50;transition:transform .3s;overflow-y:auto}
        .sidebar .nav-item{display:flex;align-items:center;gap:12px;padding:13px 24px;color:rgba(255,255,255,.78);cursor:pointer;transition:all .3s;border-radius:0 30px 30px 0;margin-right:14px;font-size:14px;font-weight:500}
        .sidebar .nav-item:hover,.sidebar .nav-item.active{background:rgba(255,255,255,.28);color:#fff;transform:translateX(4px)}
        .sidebar .nav-item i{width:20px;text-align:center;font-size:16px}
        .main-content{margin-left:260px;min-height:100vh;padding:32px 32px 100px;transition:margin .3s}
        .card{background:#fff;border-radius:20px;box-shadow:var(--cs);padding:24px;transition:all .3s}
        .card:hover{box-shadow:var(--ch);transform:translateY(-2px)}
        .card-static{background:#fff;border-radius:20px;box-shadow:var(--cs);padding:24px}
        .stat-card{background:#fff;border-radius:20px;padding:22px;box-shadow:var(--cs);transition:all .3s;overflow:hidden}
        .stat-card:hover{transform:translateY(-4px);box-shadow:var(--ch)}
        .stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
        .khs-split{display:grid;grid-template-columns:1fr 1fr;border-radius:16px;overflow:hidden;box-shadow:var(--cs);transition:all .3s}
        .khs-split:hover{box-shadow:var(--ch);transform:translateY(-2px)}
        .khs-split .left{background:linear-gradient(135deg,#ff9a9e,#fad0c4);padding:20px;color:#fff}
        .khs-split .right{background:linear-gradient(135deg,#a8d8ea,#e8f4fd);padding:20px;color:#2d2d2d}
        .course-item{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(255,107,138,.05);transition:all .3s;margin-bottom:10px}
        .course-item:hover{box-shadow:var(--cs);transform:translateX(4px)}
        .sem-card{background:#fff;border-radius:20px;padding:24px;box-shadow:var(--cs);cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
        .sem-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#ff9a9e,#fad0c4)}
        .sem-card:hover{transform:translateY(-4px);box-shadow:var(--ch)}
        .rec-card{background:linear-gradient(135deg,#fff0f3,#ffe4ec);border:2px dashed #ffc9d6;border-radius:14px;padding:16px 20px;transition:all .3s;margin-bottom:10px}
        .rec-card:hover{border-color:var(--pa);background:linear-gradient(135deg,#ffe4ec,#ffc9d6)}
        .input-field{width:100%;padding:14px 20px 14px 48px;border:2px solid #ffe4ec;border-radius:14px;font-family:'Poppins',sans-serif;font-size:14px;color:#2d2d2d;transition:all .3s;background:#fff;outline:none}
        .input-field:focus{border-color:var(--pa);box-shadow:0 0 0 4px rgba(255,107,138,.1)}
        .btn-pink{background:linear-gradient(135deg,#ff9a9e,#ff6b8a);color:#fff;border:none;padding:13px 30px;border-radius:30px;font-family:'Poppins',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(255,107,138,.3)}
        .btn-pink:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,138,.4)}
        .btn-pink:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .btn-outline{background:transparent;color:var(--pa);border:2px solid var(--pa);padding:10px 24px;border-radius:30px;font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .3s}
        .btn-outline:hover{background:var(--pa);color:#fff}
        .btn-print{background:transparent;color:#6b7280;border:2px solid #e5e7eb;padding:8px 18px;border-radius:30px;font-family:'Poppins',sans-serif;font-weight:500;font-size:12px;cursor:pointer;transition:all .3s}
        .btn-print:hover{border-color:var(--pa);color:var(--pa);background:#fff0f3}
        .btn-sm{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:14px}
        .btn-add{background:linear-gradient(135deg,#ff9a9e,#ff6b8a);color:#fff}
        .btn-add:hover{transform:scale(1.1);box-shadow:0 3px 12px rgba(255,107,138,.4)}
        .btn-remove{background:#fee2e2;color:#f87171}
        .btn-remove:hover{background:#f87171;color:#fff;transform:scale(1.1)}
        .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .badge-pink{background:#fff0f3;color:#ff6b8a}.badge-blue{background:#e8f4fd;color:#4a90d9}.badge-green{background:#ecfdf5;color:#059669}.badge-yellow{background:#fefce8;color:#ca8a04}.badge-red{background:#fef2f2;color:#dc2626}
        .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;box-shadow:0 -4px 20px rgba(0,0,0,.07);z-index:50;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom))}
        .bottom-nav .bnav{display:flex;flex-direction:column;align-items:center;gap:3px;color:#bbb;font-size:10px;font-weight:500;cursor:pointer;transition:color .3s;padding:4px 0}
        .bottom-nav .bnav.active{color:var(--pa)}.bottom-nav .bnav i{font-size:20px}
        .toast{position:fixed;top:20px;right:20px;background:#fff;padding:16px 24px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.12);z-index:1000;transform:translateX(140%);transition:transform .45s cubic-bezier(.68,-.55,.27,1.55);display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;max-width:360px}
        .toast.show{transform:translateX(0)}.toast.success{border-left:4px solid #4ade80}.toast.error{border-left:4px solid #f87171}.toast.info{border-left:4px solid var(--pa)}
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
        .modal-bg.show{display:flex}
        .modal-card{background:#fff;border-radius:24px;padding:36px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:fadeIn .3s ease}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:40}.sidebar-overlay.active{display:block}
        .krs-tab{padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;border:none;font-family:'Poppins',sans-serif;white-space:nowrap}
        .krs-tab.active{background:linear-gradient(135deg,#ff9a9e,#ff6b8a);color:#fff;box-shadow:0 3px 12px rgba(255,107,138,.3)}
        .krs-tab:not(.active){background:#fff0f3;color:#ff6b8a}
        .veloura-text{font-family:'Playfair Display',serif;font-weight:800;background:linear-gradient(135deg,#ff6b8a,#d4456a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .err-msg{color:#f87171;font-size:12px;margin-top:4px;display:none}.err-msg.visible{display:block}
        .univ-logo{width:72px;height:72px;border-radius:16px;object-fit:contain}
        .univ-logo-sidebar{width:40px;height:40px;border-radius:12px;object-fit:contain}
        .avatar-ring{border-radius:50%;padding:3px;background:linear-gradient(135deg,#dc2626,#ef4444,#b91c1c);display:inline-flex;align-items:center;justify-content:center}
        .avatar-img{border-radius:50%;object-fit:cover;object-position:top center;display:block}
        .av-lg{width:116px;height:116px}.av-md{width:44px;height:44px}.av-sm{width:40px;height:40px}
        .ann-item{display:flex;gap:14px;padding:14px;border-radius:14px;transition:all .3s;cursor:default}
        .ann-item:hover{background:#fff0f3}
        .ann-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
        .schedule-row{display:grid;grid-template-columns:90px 1fr 70px 60px;gap:8px;align-items:center;padding:10px 14px;border-radius:10px;font-size:13px;transition:background .2s}
        .schedule-row:hover{background:#fff0f3}
        .schedule-header{font-weight:700;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
        /* Footer */
        .app-footer{margin-top:40px;padding:24px 0;border-top:1px solid #ffe4ec;text-align:center}
        /* Print */
        @media print{
            .sidebar,.bottom-nav,.btn-pink,.btn-outline,.btn-print,.btn-sm,.btn-add,.btn-remove,.krs-tab,header,.modal-bg,.toast,.sidebar-overlay,.app-footer{display:none!important}
            .main-content{margin:0!important;padding:20px!important}
            .card:hover,.stat-card:hover,.course-item:hover,.khs-split:hover,.sem-card:hover{transform:none!important;box-shadow:0 1px 3px rgba(0,0,0,.1)!important}
            .page{display:block!important;animation:none!important}
            .khs-split .left,.khs-split .right{-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#fff0f3}::-webkit-scrollbar-thumb{background:#ffc9d6;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#ffa3b8}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0;padding:20px 16px 100px}.bottom-nav{display:flex;justify-content:space-around}.khs-split{grid-template-columns:1fr}.schedule-row{grid-template-columns:70px 1fr 50px 50px;font-size:11px;padding:8px 10px}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body class="font-body">

<div id="toast" class="toast"></div>

<div id="logout-modal" class="modal-bg" role="dialog" aria-label="Konfirmasi logout">
    <div class="modal-card">
        <div class="w-16 h-16 rounded-full bg-pink-50 flex items-center justify-center mx-auto mb-4"><i class="fas fa-right-from-bracket text-2xl" style="color:var(--pa)"></i></div>
        <h3 class="font-display text-xl font-bold mb-2">Keluar dari SIAKAD?</h3>
        <p class="text-gray-400 text-sm mb-6">Data KRS-mu tetap tersimpan di perangkat ini.</p>
        <div class="flex gap-3"><button onclick="closeLogoutModal()" class="btn-outline flex-1">Batal</button><button onclick="confirmLogout()" class="btn-pink flex-1">Ya, Keluar</button></div>
    </div>
</div>

<!-- LOGIN -->
<div id="page-login" class="page active">
    <div class="login-bg">
        <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div><div class="orb orb-4"></div><div class="orb orb-5"></div>
        <div class="relative z-10 w-full max-w-md px-5">
            <div class="bg-white/90 backdrop-blur-md rounded-3xl shadow-xl p-8 md:p-10 anim-up">
                <div class="text-center mb-8">
                    <img src="https://z-cdn-media.chatglm.cn/files/6d3efbe2-196d-4e92-b228-edfc9f2f9fd4.png?auth_key=1877625656-fd81444719d643e59866a1f7b56e0e66-0-ca45f2e7fb1e624ea588384bc1f82335" alt="Logo" class="univ-logo mx-auto mb-4" style="box-shadow:0 8px 30px rgba(255,107,138,.25)">
                    <h1 class="font-display text-2xl font-bold veloura-text">Veloura University</h1>
                    <div class="w-16 h-0.5 mx-auto mt-2 rounded-full" style="background:linear-gradient(90deg,#ff9a9e,#ff6b8a)"></div>
                    <p class="text-gray-400 text-xs mt-3">Sistem Informasi Akademik Mahasiswa</p>
                </div>
                <form id="login-form" onsubmit="handleLogin(event)" novalidate>
                    <div class="mb-5">
                        <label class="block text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">NIM</label>
                        <div class="relative"><i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-pink-300"></i><input type="text" id="input-nim" class="input-field" placeholder="Contoh: 24142009" maxlength="15" autocomplete="off" inputmode="numeric"></div>
                        <p id="err-nim" class="err-msg"></p>
                    </div>
                    <div class="mb-7">
                        <label class="block text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Nama Lengkap</label>
                        <div class="relative"><i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-pink-300"></i><input type="text" id="input-nama" class="input-field" placeholder="Masukkan nama lengkap" autocomplete="off"></div>
                        <p id="err-nama" class="err-msg"></p>
                    </div>
                    <button type="submit" class="btn-pink w-full text-center"><i class="fas fa-arrow-right-to-bracket mr-2"></i>Masuk</button>
                </form>
                <p class="text-center text-xs text-gray-300 mt-6">Veloura University &copy; 2025</p>
            </div>
        </div>
    </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" style="display:none">
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
    <aside id="sidebar" class="sidebar">
        <div class="p-6 pb-4">
            <div class="flex items-center gap-3 mb-1">
                <img src="https://z-cdn-media.chatglm.cn/files/6d3efbe2-196d-4e92-b228-edfc9f2f9fd4.png?auth_key=1877625656-fd81444719d643e59866a1f7b56e0e66-0-ca45f2e7fb1e624ea588384bc1f82335" alt="Logo" class="univ-logo-sidebar">
                <div><h2 class="font-display text-lg font-bold text-white leading-tight">Veloura</h2><p class="text-[9px] text-white/60 tracking-widest uppercase">University</p></div>
            </div>
        </div>
        <div class="px-4 mb-2">
            <div class="bg-white/15 rounded-2xl p-4">
                <div class="flex items-center gap-3">
                    <div class="avatar-ring"><img id="sidebar-avatar-img" class="avatar-img av-md" src="" alt="Foto"></div>
                    <div class="min-w-0"><p id="sidebar-name" class="text-white text-sm font-semibold truncate"></p><p id="sidebar-nim" class="text-white/60 text-xs truncate"></p></div>
                </div>
            </div>
        </div>
        <nav class="mt-2" aria-label="Navigasi utama">
            <div class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')"><i class="fas fa-house"></i><span>Dashboard</span></div>
            <div class="nav-item" data-page="krs" onclick="navigateTo('krs')"><i class="fas fa-file-lines"></i><span>KRS</span></div>
            <div class="nav-item" data-page="khs" onclick="navigateTo('khs')"><i class="fas fa-chart-column"></i><span>KHS</span></div>
            <div class="nav-item" data-page="profil" onclick="navigateTo('profil')"><i class="fas fa-circle-user"></i><span>Profil</span></div>
        </nav>
        <div class="mt-auto p-6 pt-8">
            <div class="nav-item" onclick="showLogoutModal()" style="margin-right:0;border-radius:14px"><i class="fas fa-right-from-bracket"></i><span>Keluar</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="md:hidden flex items-center justify-between mb-5">
            <button onclick="toggleSidebar()" class="w-10 h-10 rounded-xl bg-white shadow flex items-center justify-center" aria-label="Menu"><i class="fas fa-bars" style="color:var(--pa)"></i></button>
            <h2 class="font-display text-base font-bold veloura-text">Veloura</h2>
            <div class="avatar-ring"><img class="avatar-img av-sm" src="https://z-cdn-media.chatglm.cn/files/8d6c996a-5d00-4535-8fd0-0f92c61160b7.jpg?auth_key=1877625656-9c40bb5ce56045a7bf1189d3c7783921-0-9e496e189c651ccd4d72c508de528a0b" alt="Foto"></div>
        </header>
        <section id="page-dashboard" class="page"></section>
        <section id="page-krs" class="page"></section>
        <section id="page-khs" class="page"></section>
        <section id="page-khs-detail" class="page"></section>
        <section id="page-profil" class="page"></section>
        <footer class="app-footer" id="app-footer"></footer>
    </main>

    <nav class="bottom-nav" aria-label="Navigasi bawah">
        <div class="bnav active" data-page="dashboard" onclick="navigateTo('dashboard')"><i class="fas fa-house"></i><span>Dashboard</span></div>
        <div class="bnav" data-page="krs" onclick="navigateTo('krs')"><i class="fas fa-file-lines"></i><span>KRS</span></div>
        <div class="bnav" data-page="khs" onclick="navigateTo('khs')"><i class="fas fa-chart-column"></i><span>KHS</span></div>
        <div class="bnav" data-page="profil" onclick="navigateTo('profil')"><i class="fas fa-circle-user"></i><span>Profil</span></div>
    </nav>
</div>

var PHOTO='https://z-cdn-media.chatglm.cn/files/8d6c996a-5d00-4535-8fd0-0f92c61160b7.jpg?auth_key=1877625656-9c40bb5ce56045a7bf1189d3c7783921-0-9e496e189c651ccd4d72c508de528a0b';

    return{days:Math.floor(diff/86400000),hours:Math.floor((diff%86400000)/3600000),mins:Math.floor((diff%3600000)/60000),secs:Math.floor((diff%60000)/1000),expired:false};
}

/* KRS */
function switchKRSTab(t){krsTab=t;renderKRS()}
function renderKRS(){
    var el=document.getElementById('page-krs'),av=MASTER.courses[CUR_SEM]||[],sel=[];
    for(var i=0;i<krsSelection.length;i++){var c=findCourse(krsSelection[i]);if(c)sel.push(c)}
    var cs=calcKRSSKS(),rem=MAX_SKS-cs,recs=getRecs(av,cs);
    var h='<div class="anim-up flex flex-wrap items-center justify-between gap-3"><div><h1 class="font-display text-2xl md:text-3xl font-bold" style="color:var(--pa)">Kartu Rencana Studi</h1><p class="text-sm text-gray-400 mt-1">Semester '+CUR_SEM+' &mdash; '+UNIV+'</p></div><button onclick="window.print()" class="btn-print"><i class="fas fa-print mr-2"></i>Cetak KRS</button></div>';
    h+='<div class="card-static mt-6 anim-up d1 flex flex-wrap items-center justify-between gap-4" style="background:linear-gradient(135deg,#fff0f3,#ffe4ec);border:2px solid #ffc9d6;border-radius:20px;padding:20px 24px"><div><p class="text-xs text-gray-400 font-medium">Total SKS Dipilih</p><p class="text-3xl font-bold" style="color:var(--pa)">'+cs+' <span class="text-base font-normal text-gray-400">/ '+MAX_SKS+' SKS</span></p></div><div class="flex items-center gap-3"><div class="w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold '+(rem<=0?'text-red-400':'text-white')+'" style="background:'+(rem<=0?'#fee2e2':'linear-gradient(135deg,#ff9a9e,#ff6b8a)')+'">'+rem+'</div><div><p class="text-xs font-semibold '+(rem<=0?'text-red-400':'text-gray-600')+'">SKS Tersisa</p><p class="text-[10px] text-gray-400">'+(rem<=0?'Batas tercapai':'Bisa tambah matkul')+'</p></div></div></div>';
    h+='<div class="flex gap-2 mt-6 mb-4 md:hidden anim-up d2 overflow-x-auto pb-1"><button class="krs-tab '+(krsTab==='tersedia'?'active':'')+'" onclick="switchKRSTab(\'tersedia\')">Tersedia ('+av.length+')</button><button class="krs-tab '+(krsTab==='krs'?'active':'')+'" onclick="switchKRSTab(\'krs\')">KRS Saya ('+sel.length+')</button><button class="krs-tab '+(krsTab==='rekomendasi'?'active':'')+'" onclick="switchKRSTab(\'rekomendasi\')">Rekomendasi</button></div>';
    h+='<div class="grid lg:grid-cols-5 gap-6 mt-6">';
    h+='<div class="lg:col-span-3 '+(krsTab!=='tersedia'?'hidden md:block':'')+' anim-up d2"><div class="flex items-center justify-between mb-4"><h3 class="font-display text-lg font-bold">Mata Kuliah Tersedia</h3><span class="badge badge-pink">'+av.length+' matkul</span></div>';
    if(av.length){for(var i=0;i<av.length;i++)h+=cItemHTML(av[i],krsSelection.indexOf(av[i].kode)===-1,false)}else h+='<p class="text-gray-400 text-sm text-center py-8">Tidak ada matkul tersedia</p>';
    h+='</div><div class="lg:col-span-2">';
    h+='<div class="'+(krsTab!=='krs'?'hidden md:block':'')+' anim-up d3"><div class="flex items-center justify-between mb-4"><h3 class="font-display text-lg font-bold">KRS Saya</h3><span class="badge badge-green">'+sel.length+' matkul</span></div>';
    if(sel.length){for(var i=0;i<sel.length;i++)h+=cItemHTML(sel[i],false,true)}else h+='<div class="text-center py-10" style="background:#fff0f3;border-radius:16px"><i class="fas fa-inbox text-4xl mb-3" style="color:#ffc9d6"></i><p class="text-gray-400 text-sm">Belum ada matkul dipilih</p></div>';
    h+='</div>';
    h+='<div class="mt-6 '+(krsTab!=='rekomendasi'?'hidden md:block':'')+' anim-up d4"><div class="flex items-center gap-3 mb-4"><div class="w-10 h-10 rounded-full flex items-center justify-center" style="background:linear-gradient(135deg,#c084fc,#a855f7)"><i class="fas fa-wand-magic-sparkles text-white text-sm"></i></div><div><h3 class="font-display text-lg font-bold leading-tight">Rekomendasi</h3><p class="text-[10px] text-gray-400">Berdasarkan riwayat akademikmu</p></div></div>';
    if(recs.length){for(var i=0;i<recs.length;i++){var rc=recs[i];h+='<div class="rec-card flex items-center justify-between"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 mb-1"><span class="badge badge-pink">'+rc.kode+'</span><span class="badge badge-blue">'+rc.sks+' SKS</span></div><p class="font-semibold text-sm truncate">'+rc.nama+'</p><p class="text-xs text-gray-400"><i class="fas fa-user-tie mr-1"></i>'+rc.dosen+'</p></div><button onclick="addCourse(\''+rc.kode+'\')" class="btn-sm btn-add ml-2 flex-shrink-0"><i class="fas fa-plus"></i></button></div>'}}else h+='<div class="text-center py-8" style="background:#f5f3ff;border-radius:16px"><i class="fas fa-check-double text-3xl mb-2" style="color:#c084fc"></i><p class="text-gray-400 text-sm">'+(cs>=MAX_SKS?'SKS sudah penuh':'Tidak ada rekomendasi')+'</p></div>';
    h+='</div><div class="mt-6 '+(krsTab!=='krs'?'hidden md:block':'')+'"><button onclick="saveKRS()" class="btn-pink w-full text-center" '+(sel.length===0?'disabled':'')+'><i class="fas fa-floppy-disk mr-2"></i>Simpan KRS</button></div></div></div>';
    h+='<div class="mt-6 md:hidden '+(krsTab!=='krs'?'hidden':'')+'"><button onclick="saveKRS()" class="btn-pink w-full text-center" '+(sel.length===0?'disabled':'')+'><i class="fas fa-floppy-disk mr-2"></i>Simpan KRS</button></div>';
    el.innerHTML=h;
}
function cItemHTML(c,canAdd,isR){var btn='';if(isR)btn='<button onclick="removeCourse(\''+c.kode+'\')" class="btn-sm btn-remove flex-shrink-0 ml-2"><i class="fas fa-xmark"></i></button>';else if(canAdd)btn='<button onclick="addCourse(\''+c.kode+'\')" class="btn-sm btn-add flex-shrink-0 ml-2"><i class="fas fa-plus"></i></button>';else btn='<span class="badge badge-green flex-shrink-0 ml-2"><i class="fas fa-check mr-1"></i>Diambil</span>';return'<div class="course-item"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 mb-1 flex-wrap"><span class="badge badge-pink">'+c.kode+'</span><span class="badge badge-blue">'+c.sks+' SKS</span></div><h4 class="font-semibold text-sm">'+c.nama+'</h4><p class="text-xs text-gray-400 mt-1"><i class="fas fa-user-tie mr-1"></i>'+c.dosen+'</p><p class="text-xs text-gray-400"><i class="fas fa-clock mr-1"></i>'+c.jadwal+' &middot; '+c.ruang+'</p></div>'+btn+'</div>'}
function addCourse(k){var cs=calcKRSSKS(),c=findCourse(k);if(!c)return;if(krsSelection.indexOf(k)!==-1){showToast('Sudah ada di KRS','error');return}if(cs+c.sks>MAX_SKS){showToast('SKS tidak cukup (butuh '+c.sks+', sisa '+(MAX_SKS-cs)+')','error');return}krsSelection.push(k);renderKRS();showToast(c.nama+' ditambahkan','success')}
function removeCourse(k){krsSelection=krsSelection.filter(function(x){return x!==k});var c=findCourse(k);renderKRS();if(c)showToast(c.nama+' dihapus','info')}
function saveKRS(){if(!krsSelection.length)return;sv('krs',krsSelection);showToast('KRS berhasil disimpan!','success')}
function getRecs(av,cs){if(cs>=MAX_SKS)return[];var rem=MAX_SKS-cs,taken={},ks=Object.keys(MASTER.khs);for(var s=0;s<ks.length;s++){var k=MASTER.khs[ks[s]];for(var i=0;i<k.length;i++)taken[k[i].kode]=true}for(var i=0;i<krsSelection.length;i++)taken[krsSelection[i]]=true;var r=[];for(var i=0;i<av.length;i++){if(!taken[av[i].kode]&&av[i].sks<=rem)r.push(av[i])}r.sort(function(a,b){return b.sks-a.sks||a.kode.localeCompare(b.kode)});return r.slice(0,3)}

/* KHS */
function renderKHS(){

    h+='</div>';el.innerHTML=h;
}

/* KHS DETAIL */
function renderKHSDetail(semester){

    var h='<div class="anim-up flex flex-wrap items-center justify-between gap-3"><button onclick="navigateTo(\'khs\')" class="btn-outline"><i class="fas fa-arrow-left mr-2"></i>Kembali</button><button onclick="window.print()" class="btn-print"><i class="fas fa-print mr-2"></i>Cetak KHS</button></div>';

    h+='<div class="space-y-4">';
    for(var i=0;i<khs.length;i++){var it=khs[i],c=findCourse(it.kode);if(!c)continue;var dl=Math.min(i+1,5);
    h+='<div class="khs-split anim-up d'+dl+'"><div class="left"><div class="space-y-3"><div><p class="text-[10px] uppercase tracking-wider opacity-70">Kode Mata Kuliah</p><p class="font-bold text-sm mt-0.5">'+c.kode+'</p></div><div><p class="text-[10px] uppercase tracking-wider opacity-70">Nama Mata Kuliah</p><p class="font-bold text-sm mt-0.5">'+c.nama+'</p></div><div><p class="text-[10px] uppercase tracking-wider opacity-70">Dosen Pengampu</p><p class="font-semibold text-xs mt-0.5 opacity-90">'+c.dosen+'</p></div></div></div><div class="right"><div class="space-y-3"><div><p class="text-[10px] uppercase tracking-wider text-gray-400">Jadwal</p><p class="font-bold text-sm mt-0.5">'+c.jadwal+'</p></div><div><p class="text-[10px] uppercase tracking-wider text-gray-400">Ruang</p><p class="font-bold text-sm mt-0.5">'+c.ruang+'</p></div><div class="flex items-center justify-between"><div><p class="text-[10px] uppercase tracking-wider text-gray-400">SKS</p><p class="font-bold text-sm mt-0.5">'+c.sks+'</p></div><div class="text-right"><p class="text-[10px] uppercase tracking-wider text-gray-400">Nilai</p><span class="badge '+nilaiBadge(it.nilai)+' text-lg font-bold px-4 py-1 mt-0.5 inline-block">'+it.nilai+'</span></div></div></div></div></div>'}
    h+='</div>';
    h+='<div class="card-static mt-6 anim-up d5" style="background:linear-gradient(135deg,#fff0f3,#fff);border-radius:20px;padding:24px"><h3 class="font-display text-lg font-bold mb-4"><i class="fas fa-calculator mr-2" style="color:var(--pa)"></i>Perhitungan IPS</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr style="border-bottom:2px solid #ffe4ec"><th class="text-left py-2 px-3 font-semibold text-gray-500 text-xs uppercase">Kode</th><th class="text-left py-2 px-3 font-semibold text-gray-500 text-xs uppercase">Mata Kuliah</th><th class="text-center py-2 px-3 font-semibold text-gray-500 text-xs uppercase">SKS</th><th class="text-center py-2 px-3 font-semibold text-gray-500 text-xs uppercase">Nilai</th><th class="text-center py-2 px-3 font-semibold text-gray-500 text-xs uppercase">Bobot</th><th class="text-center py-2 px-3 font-semibold text-gray-500 text-xs uppercase">NxS</th></tr></thead><tbody>';
    for(var i=0;i<khs.length;i++){var it=khs[i],c=findCourse(it.kode);if(!c)continue;var b=nilaiToBobot(it.nilai);
    h+='<tr style="border-bottom:1px solid #fef0f3"><td class="py-3 px-3 font-semibold" style="color:var(--pa)">'+c.kode+'</td><td class="py-3 px-3 text-gray-600">'+c.nama+'</td><td class="py-3 px-3 text-center font-semibold">'+c.sks+'</td><td class="py-3 px-3 text-center"><span class="badge '+nilaiBadge(it.nilai)+'">'+it.nilai+'</span></td><td class="py-3 px-3 text-center font-semibold">'+b.toFixed(1)+'</td><td class="py-3 px-3 text-center font-bold" style="color:var(--pa)">'+(b*c.sks).toFixed(1)+'</td></tr>'}

    h+='<div class="mt-4 pt-4 text-center" style="border-top:2px dashed #ffc9d6"><p class="text-sm text-gray-400">IPS Semester '+semester+'</p><p class="text-4xl font-bold mt-1" style="color:var(--pa)">'+ips.toFixed(2)+'</p><p class="text-xs text-gray-400 mt-1">Total Bobot / Total SKS = '+tbs.toFixed(1)+' / '+sksT+'</p></div></div>';
